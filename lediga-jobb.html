<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Lediga jobb</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Lediga jobb</h2>

  <!-- 🔍 Filterfält -->
  <div class="filter-bar">

    <!-- Fritextsökning -->
    <input type="text" id="searchInput" placeholder="Sök jobb, ort eller arbetsgivare">

    <!-- Län -->
    <select id="regionFilter">
      <option value="">Alla län</option>
      <option value="Östergötlands län">Östergötlands län</option>
      <option value="Stockholms län">Stockholms län</option>
      <option value="Skåne län">Skåne län</option>
      <option value="Västra Götalands län">Västra Götalands län</option>
      <option value="Södermanlands län">Södermanlands län</option>
      <option value="Jönköpings län">Jönköpings län</option>
      <option value="Uppsala län">Uppsala län</option>
      <option value="Västmanlands län">Västmanlands län</option>
      <option value="Örebro län">Örebro län</option>
      <option value="Kalmar län">Kalmar län</option>
      <option value="Norrbottens län">Norrbottens län</option>
    </select>

    <!-- Kommun (fylls automatiskt beroende på valt län) -->
    <select id="municipalityFilter">
      <option value="">Alla kommuner</option>
    </select>

    <!-- Yrkesområde -->
    <select id="categoryFilter">
      <option value="">Alla yrken</option>
      <option value="IT">IT</option>
      <option value="Vård">Vård</option>
      <option value="Bygg">Bygg</option>
      <option value="Utbildning">Utbildning</option>
      <option value="Ekonomi">Ekonomi</option>
      <option value="Transport">Transport</option>
      <option value="Administration">Administration</option>
      <option value="Miljö">Miljö</option>
    </select>

    <!-- Extra filter -->
    <button id="filter45plus">45+</button>
    <button id="filterNoEducation">Utan utbildningskrav</button>

    <!-- Sökknapp -->
    <button id="searchButton">Sök</button>
  </div>

  <!-- Jobblista -->
  <div id="job-container"></div>

  <script src="jobb45plus.js"></script>
</body>
</html>
